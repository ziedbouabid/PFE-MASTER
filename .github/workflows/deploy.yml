name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            test1/package-lock.json
            ERP/package-lock.json

      # Backend CI Steps
      - name: Install backend dependencies
        run: |
          cd test1
          npm ci

      - name: Lint backend
        run: |
          cd test1
          npm run lint

      - name: Run backend tests
        run: |
          cd test1
          npm run test

      # Frontend CI Steps
      - name: Install frontend dependencies
        run: |
          cd ERP
          npm ci

      - name: Lint frontend
        run: |
          cd ERP
          npm run lint

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Downcase repo name
        run: |
          echo "IMAGE_NAME_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./test1
          file: ./test1/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME_BASE }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./ERP
          file: ./ERP/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME_BASE }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Downcase repo name
        run: |
          echo "IMAGE_NAME_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        env:
          IMAGE_NAME_BASE: ${{ env.IMAGE_NAME_BASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_NAME_BASE,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            
            cat << EOF > docker-compose.yml
            services:
              db:
                image: mysql:8
                restart: always
                environment:
                  MYSQL_ROOT_PASSWORD: root_password_pfe
                  MYSQL_DATABASE: my_nestjs_project
                  MYSQL_USER: zied
                  MYSQL_PASSWORD: azertyS20645307
                ports:
                  - "3306:3306"
                volumes:
                  - db_data:/var/lib/mysql

              backend:
                image: $IMAGE_NAME_BASE/backend:latest
                restart: always
                ports:
                  - "3000:3000"
                environment:
                  DB_HOST: db
                  DB_PORT: 3306
                  DB_USER: zied
                  DB_PASSWORD: azertyS20645307
                  DB_NAME: my_nestjs_project
                  JWT_SECRET: "123456"
                depends_on:
                  - db

              frontend:
                image: $IMAGE_NAME_BASE/frontend:latest
                restart: always
                ports:
                  - "80:80"
                depends_on:
                  - backend

            volumes:
              db_data:
            EOF

            # Log in to GHCR from the VPS
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pull latest configurations and images, then run
            docker compose pull
            docker compose up -d
            docker image prune -f
